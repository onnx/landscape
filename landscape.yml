landscape:
  - name: Training Frameworks
    subcategories:
      - name: Training Frameworks
        items:
          - name: PyTorch
            homepage_url: https://pytorch.org/docs/stable/onnx.html
            logo: hosted_logos/pytorch.svg
            description: Native torch.onnx export to ONNX format.

          - name: TensorFlow
            homepage_url: https://github.com/onnx/tensorflow-onnx
            logo: hosted_logos/tensorflow.svg
            description: TensorFlow and Keras models converted to ONNX via tf2onnx.

          - name: PaddlePaddle
            homepage_url: https://github.com/PaddlePaddle/paddle-onnx
            logo: hosted_logos/paddlepaddle.svg
            description: Baidu's deep learning framework with native ONNX export.

  - name: Converters
    subcategories:
      - name: Converters
        items:
          - name: tf2onnx
            homepage_url: https://github.com/onnx/tensorflow-onnx
            logo: hosted_logos/tensorflow.svg
            description: Converts TensorFlow, Keras, and TFLite models to ONNX.

          - name: ONNXMLTools
            homepage_url: https://github.com/onnx/onnxmltools
            logo: hosted_logos/onnx.svg
            description: Converts scikit-learn, XGBoost, LightGBM, and CatBoost models to ONNX.

          - name: Hugging Face Optimum
            homepage_url: https://huggingface.co/docs/optimum/exporters/onnx/usage_guides/export_a_model
            logo: hosted_logos/huggingface.svg
            description: Exports Transformers and Diffusers models to ONNX.

  - name: Runtimes
    subcategories:
      - name: Runtimes
        items:
          - name: ONNX Runtime
            homepage_url: https://github.com/microsoft/onnxruntime
            logo: hosted_logos/onnxruntime.svg
            description: Cross-platform, high-performance ML inference and training accelerator by Microsoft.

          - name: Intel OpenVINO
            homepage_url: https://docs.openvino.ai/
            logo: hosted_logos/intel.svg
            description: Intel's toolkit for optimizing and deploying ONNX models on Intel hardware.

          - name: NVIDIA TensorRT
            homepage_url: https://developer.nvidia.com/tensorrt
            logo: hosted_logos/nvidia.svg
            description: High-performance deep learning inference SDK for NVIDIA GPUs.

  - name: Compilers
    subcategories:
      - name: Compilers
        items:
          - name: ONNX-MLIR
            homepage_url: https://onnx.ai/onnx-mlir
            logo: hosted_logos/onnx.svg
            description: Compiles ONNX models to native code using the MLIR compiler infrastructure.

          - name: Apache TVM
            homepage_url: https://tvm.apache.org/
            logo: hosted_logos/apachetvm.svg
            description: Open deep learning compiler stack that ingests ONNX models.

          - name: Torch-MLIR
            homepage_url: https://github.com/llvm/torch-mlir
            logo: hosted_logos/llvm.svg
            description: MLIR-based compiler for PyTorch models including ONNX export paths.

  - name: Hardware & Accelerators
    subcategories:
      - name: Hardware & Accelerators
        items:
          - name: Qualcomm AI Stack
            homepage_url: https://www.qualcomm.com/developer/artificial-intelligence
            logo: hosted_logos/qualcomm.svg
            description: ONNX inference on Qualcomm Snapdragon mobile and edge platforms.

          - name: Groq
            homepage_url: https://groq.com/products/
            logo: hosted_logos/groq.svg
            description: Groq LPU supports ONNX model deployment for high-throughput inference.

          - name: Intel Habana Gaudi
            homepage_url: https://habana.ai/
            logo: hosted_logos/intel.svg
            description: Habana Gaudi AI accelerators with ONNX training and inference support.

  - name: Optimization
    subcategories:
      - name: Optimization
        items:
          - name: ONNX Optimizer
            homepage_url: https://github.com/onnx/optimizer
            logo: hosted_logos/onnx.svg
            description: Graph-level optimizations including constant folding and operator fusion.

          - name: Microsoft Olive
            homepage_url: https://github.com/microsoft/Olive
            logo: hosted_logos/microsoft.svg
            description: Hardware-aware model optimization toolchain targeting ONNX Runtime.

          - name: ORT Quantization
            homepage_url: https://onnxruntime.ai/docs/performance/model-optimizations/quantization.html
            logo: hosted_logos/onnxruntime.svg
            description: Quantize ONNX models to INT8/INT4 for reduced size and faster inference.

  - name: Graph Manipulation
    subcategories:
      - name: Graph Manipulation
        items:
          - name: ONNX Script
            homepage_url: https://github.com/microsoft/onnxscript
            logo: hosted_logos/microsoft.svg
            description: Author, transform, and rewrite ONNX graphs and functions using Python.

          - name: NVIDIA Graph Surgeon
            homepage_url: https://github.com/NVIDIA/TensorRT/tree/main/tools/onnx-graphsurgeon
            logo: hosted_logos/nvidia.svg
            description: Graph manipulation library for modifying ONNX models before TensorRT compilation.

          - name: onnx-simplifier
            homepage_url: https://github.com/daquexian/onnx-simplifier
            logo: hosted_logos/onnx.svg
            description: Simplifies ONNX models by folding constants and eliminating redundant nodes.

  - name: Visualization
    subcategories:
      - name: Visualization
        items:
          - name: Netron
            homepage_url: https://github.com/lutzroeder/Netron
            logo: hosted_logos/netron.svg
            description: The most popular viewer for ONNX and other ML model formats.

          - name: VisualDL
            homepage_url: https://github.com/PaddlePaddle/VisualDL
            logo: hosted_logos/paddlepaddle.svg
            description: PaddlePaddle's visualization tool with ONNX model graph support.

          - name: Zetane Viewer
            homepage_url: https://github.com/zetane/viewer
            logo: hosted_logos/onnx.svg
            description: Open-source 3D visualization for ONNX model computation graphs.

  - name: Model Hubs
    subcategories:
      - name: Model Hubs
        items:
          - name: ONNX Model Zoo
            homepage_url: https://github.com/onnx/models
            logo: hosted_logos/onnx.svg
            description: Official collection of pre-trained ONNX models for vision, language, and more.

          - name: Hugging Face Hub
            homepage_url: https://huggingface.co/models?library=onnx
            logo: hosted_logos/huggingface.svg
            description: Thousands of ready-to-use ONNX models hosted on Hugging Face Hub.

          - name: ONNX Model Zoo - Vision
            homepage_url: https://github.com/onnx/models#vision
            logo: hosted_logos/onnx.svg
            description: Pre-trained ONNX models for image classification, detection, and segmentation.

  - name: Cloud Services
    subcategories:
      - name: Cloud Services
        items:
          - name: Azure Machine Learning
            homepage_url: https://docs.microsoft.com/en-us/azure/machine-learning/concept-onnx
            logo: hosted_logos/microsoftazure.svg
            description: Azure ML AutoML exports models to ONNX for cross-platform deployment.

          - name: AWS SageMaker
            homepage_url: https://docs.aws.amazon.com/sagemaker/
            logo: hosted_logos/amazonaws.svg
            description: Amazon SageMaker supports ONNX model training and deployment.

          - name: Google Vertex AI
            homepage_url: https://cloud.google.com/vertex-ai
            logo: hosted_logos/googlecloud.svg
            description: Google Vertex AI supports ONNX model deployment on Google Cloud.

  - name: Validation & Testing
    subcategories:
      - name: Validation & Testing
        items:
          - name: ONNX Checker
            homepage_url: https://github.com/onnx/onnx
            logo: hosted_logos/onnx.svg
            description: Built-in model validator for checking ONNX spec compliance.

          - name: ONNX Backend Test
            homepage_url: https://github.com/onnx/onnx/tree/main/onnx/backend/test
            logo: hosted_logos/onnx.svg
            description: Standardized test suite for verifying ONNX runtime compliance.

          - name: onnxruntime-tools
            homepage_url: https://github.com/microsoft/onnxruntime/tree/main/onnxruntime/python/tools
            logo: hosted_logos/onnxruntime.svg
            description: Utilities for profiling, converting, and validating ONNX models with ORT.

